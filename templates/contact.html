<!DOCTYPE html>
<html>
<head>
    <title>Contact Us | ApnaKhet</title>
    <link rel="stylesheet" href="/static/contact.css">
</head>
<body>

<div class="main">

    <div class="contact-card">

        <h2>Contact Us</h2>

        <p class="subtext">
            Have a question or issue? Send us a message — we’ll get back to you soon.
        </p>

        <form method="POST">

            <div class="field">
                <label>Your Name</label>
                <input type="text" name="name" required placeholder="Enter your name">
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" name="email" required placeholder="example@gmail.com">
            </div>

            <div class="field">
                <label>Mobile</label>
                <input type="text" name="mobile" required placeholder="9XXXXXXXXX">
            </div>

            <div class="field">
                <label>Message</label>
                <textarea name="message" rows="5" required placeholder="Write your message here..."></textarea>
            </div>

            <button type="submit">Send Message</button>

        </form>

        <div class="info">
            <p>📧 support@apnakhet.com</p>
            <p>📞 +91 7058570828</p>
            <p>📍 Kolhapur, Maharashtra</p>
        </div>

    </div>

</div>

</body>
</html>
